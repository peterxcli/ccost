name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  BIN_NAME: codex-cost
  TARGET: aarch64-apple-darwin
  TAP_REPO: peterxcli/homebrew-tap

jobs:
  release:
    name: Release macOS arm64 binary
    runs-on: macos-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Check Apple signing secrets
        env:
          APPLE_DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          missing=0
          for secret_name in \
            APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 \
            APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD \
            APPLE_ID \
            APPLE_APP_SPECIFIC_PASSWORD \
            APPLE_TEAM_ID
          do
            if [ -z "${!secret_name}" ]; then
              echo "::error::Missing required Actions secret: ${secret_name}"
              missing=1
            fi
          done
          exit "${missing}"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.TARGET }}

      - name: Validate tag version
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          cargo_version="$(cargo metadata --locked --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "codex-cost") | .version')"
          if [ "${version}" != "${cargo_version}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match Cargo.toml version ${cargo_version}" >&2
            exit 1
          fi

      - name: Test
        run: cargo test --locked

      - name: Build
        run: cargo build --release --locked --target "${TARGET}"

      - name: Import Developer ID certificate
        id: import_signing_certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          certificate_path="${RUNNER_TEMP}/developer-id-application.p12"
          keychain_path="${RUNNER_TEMP}/codex-cost-signing.keychain-db"
          keychain_password="$(uuidgen)"

          echo "${CERTIFICATE_BASE64}" | base64 --decode > "${certificate_path}"
          security create-keychain -p "${keychain_password}" "${keychain_path}"
          security set-keychain-settings -lut 21600 "${keychain_path}"
          security unlock-keychain -p "${keychain_password}" "${keychain_path}"
          security import "${certificate_path}" \
            -f pkcs12 \
            -k "${keychain_path}" \
            -P "${CERTIFICATE_PASSWORD}" \
            -T /usr/bin/codesign \
            -T /usr/bin/productsign
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "${keychain_password}" \
            "${keychain_path}"
          security list-keychains -d user -s "${keychain_path}"

          identity="$(security find-identity -v -p codesigning "${keychain_path}" | awk -F '"' '/Developer ID Application/ { print $2; exit }')"
          if [ -z "${identity}" ]; then
            echo "::error::No Developer ID Application identity found in APPLE_DEVELOPER_ID_CERTIFICATE_BASE64"
            security find-identity -v -p codesigning "${keychain_path}" || true
            exit 1
          fi

          {
            echo "identity=${identity}"
            echo "keychain_path=${keychain_path}"
          } >> "${GITHUB_OUTPUT}"

      - name: Sign binary
        run: |
          set -euo pipefail
          binary_path="target/${TARGET}/release/${BIN_NAME}"
          codesign \
            --force \
            --options runtime \
            --timestamp \
            --sign "${{ steps.import_signing_certificate.outputs.identity }}" \
            "${binary_path}"
          codesign --verify --strict --verbose=4 "${binary_path}"
          codesign --display --verbose=4 "${binary_path}"

      - name: Package signed binary
        id: package
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          asset="${BIN_NAME}-${TARGET}.zip"
          staging="$(mktemp -d)"
          cp "target/${TARGET}/release/${BIN_NAME}" "${staging}/${BIN_NAME}"
          ditto -c -k --keepParent "${staging}/${BIN_NAME}" "${asset}"
          sha256="$(shasum -a 256 "${asset}" | awk '{print $1}')"
          {
            echo "version=${version}"
            echo "asset=${asset}"
            echo "sha256=${sha256}"
          } >> "${GITHUB_OUTPUT}"

      - name: Notarize signed binary
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          xcrun notarytool submit "${{ steps.package.outputs.asset }}" \
            --apple-id "${APPLE_ID}" \
            --team-id "${APPLE_TEAM_ID}" \
            --password "${APPLE_APP_SPECIFIC_PASSWORD}" \
            --wait

      - name: Verify notarized binary
        run: |
          set -euo pipefail
          spctl --assess --type execute --verbose=4 "target/${TARGET}/release/${BIN_NAME}"
          unzip -l "${{ steps.package.outputs.asset }}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.asset }}
          fail_on_unmatched_files: true
          generate_release_notes: true

      - name: Publish Homebrew tap release asset
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          tap_tag="${BIN_NAME}-v${{ steps.package.outputs.version }}"
          if gh release view "${tap_tag}" --repo "${TAP_REPO}" >/dev/null 2>&1; then
            gh release upload "${tap_tag}" "${{ steps.package.outputs.asset }}" --repo "${TAP_REPO}" --clobber
          else
            gh release create "${tap_tag}" "${{ steps.package.outputs.asset }}" \
              --repo "${TAP_REPO}" \
              --target main \
              --title "${BIN_NAME} v${{ steps.package.outputs.version }}" \
              --notes "Homebrew Cask binary for ${BIN_NAME} v${{ steps.package.outputs.version }}."
          fi

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TAP_REPO }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update Homebrew cask
        run: |
          set -euo pipefail
          cask_path="homebrew-tap/Casks/${BIN_NAME}.rb"
          mkdir -p "$(dirname "${cask_path}")"
          asset="${{ steps.package.outputs.asset }}"
          cat > "${cask_path}" <<EOF
          cask "${BIN_NAME}" do
            version "${{ steps.package.outputs.version }}"
            sha256 "${{ steps.package.outputs.sha256 }}"

            url "https://github.com/${TAP_REPO}/releases/download/${BIN_NAME}-v#{version}/${asset}"
            name "${BIN_NAME}"
            desc "Terminal UI for inspecting Codex session token usage and cost estimates"
            homepage "https://github.com/${GITHUB_REPOSITORY}"

            depends_on arch: :arm64

            binary "${BIN_NAME}"
          end
          EOF
          ruby -pi -e 'gsub(/^ {10}/, "")' "${cask_path}"

      - name: Commit Homebrew tap update
        working-directory: homebrew-tap
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "Casks/${BIN_NAME}.rb"
          if git diff --cached --quiet; then
            echo "Homebrew cask already up to date."
            exit 0
          fi
          git commit -m "Update ${BIN_NAME} to ${{ steps.package.outputs.version }}"
          git push

      - name: Delete temporary signing keychain
        if: ${{ always() && steps.import_signing_certificate.outputs.keychain_path != '' }}
        run: security delete-keychain "${{ steps.import_signing_certificate.outputs.keychain_path }}"

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  BIN_NAME: codex-cost
  TARGET_AMD64: x86_64-unknown-linux-gnu
  TARGET_ARM64: aarch64-unknown-linux-gnu
  CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

jobs:
  release:
    name: Release Linux binaries
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build targets
        run: |
          set -euo pipefail
          rustup target add "${TARGET_AMD64}" "${TARGET_ARM64}"
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Validate tag version
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          cargo_version="$(cargo metadata --locked --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "codex-cost") | .version')"
          if [ "${version}" != "${cargo_version}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match Cargo.toml version ${cargo_version}" >&2
            exit 1
          fi

      - name: Test
        run: cargo test --locked

      - name: Build
        run: |
          set -euo pipefail
          cargo build --release --locked --target "${TARGET_AMD64}"
          cargo build --release --locked --target "${TARGET_ARM64}"

      - name: Package
        run: |
          set -euo pipefail
          package_asset() {
            local target="$1"
            local arch="$2"
            local asset="${BIN_NAME}-linux-${arch}.tar.gz"
            local staging
            staging="$(mktemp -d)"
            cp "target/${target}/release/${BIN_NAME}" "${staging}/${BIN_NAME}"
            tar -C "${staging}" -czf "${asset}" "${BIN_NAME}"
            shasum -a 256 "${asset}" > "${asset}.sha256"
          }

          package_asset "${TARGET_AMD64}" amd64
          package_asset "${TARGET_ARM64}" arm64

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.BIN_NAME }}-linux-amd64.tar.gz
            ${{ env.BIN_NAME }}-linux-amd64.tar.gz.sha256
            ${{ env.BIN_NAME }}-linux-arm64.tar.gz
            ${{ env.BIN_NAME }}-linux-arm64.tar.gz.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true
